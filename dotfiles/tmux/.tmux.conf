# ============================================================================
# TMUX CONFIGURATION
# ============================================================================

# ----------------------------------------------------------------------------
# Reload Configuration
# ----------------------------------------------------------------------------
unbind r                              # Remove default binding for 'r' key
bind r source-file ~/.tmux.conf       # Bind 'r' to reload this config file (use: prefix + r)

# ----------------------------------------------------------------------------
# Terminal & Color Support
# ----------------------------------------------------------------------------
set-option -g default-terminal 'screen-256color'              # Set terminal type to support 256 colors
set-option -g terminal-overrides ',xterm-256color:RGB'        # Enable true color (24-bit RGB) support
set -g default-terminal "${TERM}"                             # Use the current terminal's TERM value
set -g extended-keys on                                       # Enable extended key sequences (e.g. Shift+Enter)
set -g extended-keys-format csi-u                             # Use CSI-u encoding (required by pi)
set -as terminal-features 'xterm-ghostty:extkeys'             # Pass extended keys through for Ghostty terminal
set -as terminal-features 'xterm-ghostty:hyperlinks'          # Enable OSC 8 hyperlink passthrough for Ghostty

# ----------------------------------------------------------------------------
# Mouse & Interaction
# ----------------------------------------------------------------------------
set -g mouse on                       # Mouse on: drag selects per-pane, tmux-yank copies to clipboard. Shift+drag bypasses to native terminal selection.

# ----------------------------------------------------------------------------
# History & Scrollback
# ----------------------------------------------------------------------------
set -g history-limit 10000            # Store 10,000 lines of scrollback history per pane
set -g history-limit 1000000          # Override: store 1,000,000 lines (massive history buffer)

# ----------------------------------------------------------------------------
# Window & Pane Numbering
# ----------------------------------------------------------------------------
set -g base-index 1                   # Start window numbering at 1 (instead of 0) for easier keyboard access
setw -g pane-base-index 1             # Start pane numbering at 1 (instead of 0)

# ----------------------------------------------------------------------------
# Prefix Key (Leader Key)
# ----------------------------------------------------------------------------
set -g prefix C-space                 # Set prefix/leader key to Ctrl+space (press this before most commands)

# ----------------------------------------------------------------------------
# Pane Navigation (No Prefix Required)
# ----------------------------------------------------------------------------
bind -n C-a select-pane -L            # Ctrl+a: move to left pane
bind -n C-s select-pane -D            # Ctrl+s: move to pane below
bind -n C-w select-pane -U            # Ctrl+w: move to pane above
bind -n C-d select-pane -R            # Ctrl+d: move to right pane

# ----------------------------------------------------------------------------
# Split Windows (No Prefix Required)
# ----------------------------------------------------------------------------
bind -n C-e split-window -h           # Ctrl+e: create vertical split (new pane to the right)
bind -n C-q split-window -v           # Ctrl+q: create horizontal split (new pane below)

# ----------------------------------------------------------------------------
# Pane Management (No Prefix Required)
# ----------------------------------------------------------------------------
bind -n M-w kill-pane                 # Option+W: close/kill the current pane
bind -n C-r select-layout even-horizontal  # Ctrl+r: balance panes evenly (horizontal)
bind -n M-h swap-pane -U                  # Option+h: move pane left  (was Ctrl+H, freed for vim-tmux-navigator)
bind -n M-l swap-pane -D                  # Option+l: move pane right (was Ctrl+L, freed for vim-tmux-navigator)

# ----------------------------------------------------------------------------
# vim-tmux-navigator: seamless Ctrl+h/j/k/l between tmux panes and Neovim windows
# ----------------------------------------------------------------------------
# When focused pane is running nvim/vim, forward the key to it; otherwise navigate tmux panes.
is_vim="ps -o state=,comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
# In tmux's copy-mode, the if-shell trick can't run, so bind directly:
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# ----------------------------------------------------------------------------
# Session Navigation (No Prefix Required)
# ----------------------------------------------------------------------------
# Note: Command (⌘) key cannot be bound in tmux - using Option/Alt (M-) instead
bind -n M-1 new-session -A -s 1 -c "$HOME"  # Option+1: switch to session 1 (create if missing)
bind -n M-2 new-session -A -s 2 -c "$HOME"  # Option+2: switch to session 2 (create if missing)
bind -n M-3 new-session -A -s 3 -c "$HOME"  # Option+3: switch to session 3 (create if missing)

# Refresh status bar whenever sessions change so pill highlight stays in sync
set-hook -g client-session-changed 'refresh-client -S'   # Fires on any session switch (bindings, sessionx, manual)
set-hook -g session-created        'refresh-client -S'   # Fires when a new session is created
set-hook -g session-closed         'refresh-client -S'   # Fires when a session is destroyed (last pane closed, kill-session, etc.)

# ----------------------------------------------------------------------------
# Session & Window Behavior
# ----------------------------------------------------------------------------

set -g detach-on-destroy off          # When closing a session, switch to another session instead of detaching
set -g escape-time 0                  # Remove delay after pressing Escape (better for vim/neovim)
set -g renumber-windows on            # Automatically renumber windows when one is closed (no gaps in numbering)

# ----------------------------------------------------------------------------
# Clipboard Integration
# ----------------------------------------------------------------------------
set -g set-clipboard on               # Enable tmux to interact with system clipboard
set -g allow-passthrough on           # Allow programs to send escape sequences directly to the outer terminal

# ----------------------------------------------------------------------------
# Status Bar Position
# ----------------------------------------------------------------------------
set -g status-position top            # Place status bar at top of screen (macOS style)

# ----------------------------------------------------------------------------
# Pane Borders & Visual Style
# ----------------------------------------------------------------------------
set -g pane-active-border-style 'fg=magenta,bg=default'       # Active pane border: magenta foreground
set -g pane-border-style 'fg=brightblack,bg=default'          # Inactive pane border: bright black (gray)
set -g pane-border-lines single                                 # Use single lines for pane borders
set -g pane-border-status off                                  # Hide pane title bar
set -g window-active-style 'fg=#cdd6f4,bg=default'            # Active pane: full brightness (Catppuccin text/base)
set -g window-style 'fg=#7f849c,bg=default'                   # Inactive pane: dimmed text (Catppuccin overlay1)

# ============================================================================
# PLUGIN CONFIGURATION
# ============================================================================

# ----------------------------------------------------------------------------
# FZF URL Plugin Settings
# ----------------------------------------------------------------------------
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'  # FZF popup size and appearance
set -g @fzf-url-history-limit '2000'                                                   # Keep 2000 URLs in history

# ----------------------------------------------------------------------------
# Plugin Declarations
# ----------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'                # TPM: Tmux Plugin Manager (required first)
set -g @plugin 'tmux-plugins/tmux-sensible'      # Sensible default settings for tmux
set -g @plugin 'tmux-plugins/tmux-yank'          # Copy to system clipboard with y key
set -g @plugin 'tmux-plugins/tmux-resurrect'     # Save/restore tmux sessions (manual)
set -g @plugin 'tmux-plugins/tmux-continuum'     # Auto-save/restore tmux sessions
set -g @plugin 'sainnhe/tmux-fzf'                # FZF integration for tmux commands
set -g @plugin 'wfxr/tmux-fzf-url'               # Extract and open URLs with FZF
set -g @plugin 'omerxx/catppuccin-tmux'          # Catppuccin theme (custom fork with meeting scripts)
set -g @plugin 'omerxx/tmux-sessionx'            # Enhanced session management with FZF
set -g @plugin 'omerxx/tmux-floax'               # Floating terminal windows in tmux

# ----------------------------------------------------------------------------
# Tmux Continuum & Resurrect Settings
# ----------------------------------------------------------------------------
set -g @continuum-restore 'on'                   # Automatically restore last saved session on tmux start
set -g @resurrect-strategy-nvim 'session'        # For Neovim: restore using session files

# ----------------------------------------------------------------------------
# Catppuccin Theme: Window Appearance
# ----------------------------------------------------------------------------
set -g @catppuccin_window_left_separator ""                           # Left separator for windows
set -g @catppuccin_window_right_separator " "                         # Right separator for windows
set -g @catppuccin_window_middle_separator " █"                       # Middle separator between window name parts
set -g @catppuccin_window_default_fill "number"                       # (Overridden below — catppuccin format unused)
set -g @catppuccin_window_default_text "#W"                           # Show window name (#W) for inactive windows
set -g @catppuccin_window_current_fill "number"                       # (Overridden below — catppuccin format unused)
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}" # Show window name + zoom indicator for active

# ----------------------------------------------------------------------------
# Catppuccin Theme: Status Bar Modules
# ----------------------------------------------------------------------------
set -g @catppuccin_status_modules_right ""                     # Right side rendered manually below (custom status-right)
set -g @catppuccin_status_modules_left ""                      # Left side rendered manually (sessions.sh script)

# ----------------------------------------------------------------------------
# Initialize TPM (Must be at bottom)
# ----------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'                    # Load and run Tmux Plugin Manager

# ============================================================================
# CUSTOM STATUS BAR STYLING (Overrides theme)
# ============================================================================
# Note: These must come AFTER TPM initialization to override plugin theme settings

# ----------------------------------------------------------------------------
# Floating Status Bar Effect
# ----------------------------------------------------------------------------
set -g status-bg default                              # Override legacy option (takes precedence over status-style)
set -g status-style "bg=default,fg=default"           # Main status bar: transparent background
set -g status-left-style "bg=default"                 # Left status section: transparent background
set -g status-right-style "bg=default"                # Right status section: transparent background
set -g window-status-style "bg=default"               # Inactive windows: transparent background
set -g window-status-current-style "bg=default"       # Active window: transparent background
set -g message-style "bg=default,fg=cyan"             # Command prompt messages: transparent bg, cyan text
set -g message-command-style "bg=default,fg=cyan"     # Command mode: transparent bg, cyan text

# ----------------------------------------------------------------------------
# Status Left: show all sessions (current highlighted)
# ----------------------------------------------------------------------------
set -g status-left-length 100                    # Allow room for multiple session pills (default 10 truncates)
set -g status-left "#(~/.tmux/sessions.sh)"       # Render sessions sorted by name (script handles ordering + styling)

# ----------------------------------------------------------------------------
# Status Right: directory + clock pills (custom, matches left-side pill style)
# ----------------------------------------------------------------------------
set -g status-right-length 100
set -g status-interval 1                          # Refresh every second so seconds tick
set -g status-right "#[fg=#f5c2e7,bg=default]#[fg=#1e1e2e,bg=#f5c2e7,bold] #{s|^.*/([^/]+)/?$|\\1|:#{s|^/Users/[^/]+/?$|~|:pane_current_path}} #[fg=#f5c2e7,bg=default]  #[fg=#74c7ec,bg=default]#[fg=#1e1e2e,bg=#74c7ec,bold] %-I:%M:%S %p #[fg=#74c7ec,bg=default]"

# ----------------------------------------------------------------------------
# Window Status: hidden entirely (no name, no number)
# ----------------------------------------------------------------------------
set -g window-status-format         ""
set -g window-status-current-format ""
set -g window-status-separator      ""

# ----------------------------------------------------------------------------
# Status Bar Layout & Padding
# ----------------------------------------------------------------------------
set -g status-format[1] ""                       # Add empty second line for padding effect
set -g status 2                                  # Enable 2-line status bar (creates floating appearance)
